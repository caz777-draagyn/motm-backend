<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kit Designer – MotM</title>
<style>
/* ── Reset & Base ──────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0d1117;
  color: #e6edf3;
  height: 100vh;
  overflow: hidden;
}

/* ── Layout ────────────────────────────────────────────────────────── */
.app {
  display: flex;
  height: 100vh;
}
.sidebar {
  width: 340px;
  min-width: 340px;
  background: #161b22;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}
.sidebar-left { border-right: 1px solid #30363d; }
.sidebar-right { border-left: 1px solid #30363d; }
.sidebar-header {
  padding: 18px 20px 10px;
  border-bottom: 1px solid #30363d;
}
.sidebar-header h1 {
  font-size: 1.25rem;
  font-weight: 600;
  color: #58a6ff;
}
.sidebar-header h1 span { font-size: 1.4rem; }
.controls {
  padding: 10px 16px 24px;
  flex: 1;
  overflow-y: auto;
}

/* ── Control Sections ────────────────────────────────────  ─────────── */
.ctrl-section {
  margin-bottom: 16px;
}
.ctrl-section h3 {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #8b949e;
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid #21262d;
}
.ctrl-group {
  margin-bottom: 10px;
}
.ctrl-group label {
  display: block;
  font-size: 0.8rem;
  color: #c9d1d9;
  margin-bottom: 3px;
}
.ctrl-group select,
.ctrl-group input[type="text"] {
  width: 100%;
  padding: 6px 8px;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 6px;
  color: #e6edf3;
  font-size: 0.82rem;
}
.ctrl-group select:focus,
.ctrl-group input[type="text"]:focus {
  outline: none;
  border-color: #58a6ff;
}

/* ── Color Picker Row ─────────────────────────────────────────────── */
.color-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.color-row label {
  width: 72px;
  font-size: 0.78rem;
  color: #c9d1d9;
  flex-shrink: 0;
}
.color-row input[type="color"] {
  width: 36px;
  height: 30px;
  border: 1px solid #30363d;
  border-radius: 4px;
  cursor: pointer;
  background: none;
  padding: 1px;
}
.color-row input[type="text"] {
  flex: 1;
  padding: 4px 6px;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 4px;
  color: #e6edf3;
  font-family: 'Consolas', monospace;
  font-size: 0.78rem;
}
.color-row .trans-tick {
  display: flex;
  align-items: center;
  gap: 2px;
  margin-left: 2px;
  flex-shrink: 0;
}
.color-row .trans-tick input { accent-color: #58a6ff; }
.color-row .trans-tick span {
  font-size: 0.65rem;
  color: #8b949e;
  cursor: pointer;
}

/* ── Slider Row ──────────────────────────────────────────────────── */
.slider-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.slider-row label {
  width: 72px;
  font-size: 0.78rem;
  color: #c9d1d9;
  flex-shrink: 0;
}
.slider-row input[type="range"] {
  flex: 1;
  accent-color: #58a6ff;
}
.slider-row .slider-val {
  width: 40px;
  text-align: right;
  font-size: 0.75rem;
  color: #8b949e;
  font-family: 'Consolas', monospace;
}

/* ── Checkbox ─────────────────────────────────────────────────────── */
.checkbox-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin: 6px 0;
}
.checkbox-row input[type="checkbox"] {
  accent-color: #58a6ff;
}
.checkbox-row label {
  font-size: 0.78rem;
  color: #c9d1d9;
  cursor: pointer;
}
.pat-targets {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 2px 4px;
}
.pat-targets .checkbox-row { margin: 1px 0; }
.pat-targets .checkbox-row label { font-size: 0.7rem; }

/* ── Buttons ──────────────────────────────────────────────────────── */
.btn {
  display: block;
  width: 100%;
  padding: 8px 12px;
  border: 1px solid #30363d;
  border-radius: 6px;
  background: #21262d;
  color: #c9d1d9;
  font-size: 0.82rem;
  cursor: pointer;
  margin-bottom: 6px;
  text-align: center;
  transition: background 0.15s, border-color 0.15s;
}
.btn:hover {
  background: #30363d;
  border-color: #58a6ff;
}
.btn-primary {
  background: #238636;
  border-color: #2ea043;
  color: #fff;
}
.btn-primary:hover {
  background: #2ea043;
}

/* ── Main Content ─────────────────────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  overflow-y: auto;
  background: #0d1117;
}
.canvas-row {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 16px;
}
.canvas-panel {
  text-align: center;
}
.canvas-panel h3 {
  font-size: 0.85rem;
  color: #8b949e;
  margin-bottom: 8px;
}
.canvas-panel canvas {
  background: #e8e8e8;
  border-radius: 8px;
  border: 1px solid #30363d;
  max-height: 70vh;
  width: auto;
  height: auto;
}

/* ── Config JSON Panel ────────────────────────────────────────────── */
.config-panel {
  width: 100%;
  max-width: 980px;
  margin-top: 12px;
}
.config-panel h3 {
  font-size: 0.85rem;
  color: #8b949e;
  margin-bottom: 6px;
}
.config-panel textarea {
  width: 100%;
  height: 180px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 6px;
  color: #7ee787;
  font-family: 'Consolas', monospace;
  font-size: 0.78rem;
  padding: 10px;
  resize: vertical;
}

.layer-box {
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 8px;
  margin-bottom: 10px;
}
.layer-box h4 {
  font-size: 0.8rem;
  color: #8b949e;
  margin-bottom: 6px;
}
</style>
</head>

<div class="app">

  <!-- ─── Sidebar ──────────────────────────────────────────────── -->

<script>
/* ═══════════════════════════════════════════════════════════════════
   1. STATE & DEFAULTS
   ═══════════════════════════════════════════════════════════════════ */
const DEFAULTS = {
  /* per-part colors */
  shirtPrimaryColor:    '#CC0000',
  shirtSecondaryColor:  '#FFFFFF',
  shirtTertiaryColor:   '#000000',
  shirtQuaternaryColor: '#FFCC00',
  shortsPrimaryColor:  '#FFFFFF',
  shortsSecondaryColor:'#CC0000',
  shortsTertiaryColor: '#000000',
  socksPrimaryColor:   '#CC0000',
  socksSecondaryColor: '#FFFFFF',
  socksTertiaryColor:  '#000000',
  collarPrimaryColor:  '#FFFFFF',
  collarSecondaryColor:'#CC0000',
  collarTertiaryColor: '#000000',
  /* pattern layers */
  patternLayers: [
    { file: '', color: '#FFFFFF', targets: [], scale: 1, offsetX: 0, offsetY: 0, rotateDeg: 0 },
    { file: '', color: '#FFFFFF', targets: [], scale: 1, offsetX: 0, offsetY: 0, rotateDeg: 0 },
    { file: '', color: '#FFFFFF', targets: [], scale: 1, offsetX: 0, offsetY: 0, rotateDeg: 0 },
  ],
  /* sponsor / crest */
  sponsorScale:   0.55,
  sponsorX:       0.50,
  sponsorY:       0.31,
  sponsorBg:      'transparent',
  sponsorBgScaleX: 1.0,
  sponsorBgScaleY: 1.0,
  sponsorDesignName: '',
  sponsorMaskPrimaryColor: '#FFFFFF',
  sponsorMaskSecondaryColor: '#000000',
  sponsorMaskTertiaryColor: '#FFD700',
  sponsorMaskSecondaryTransparent: false,
  sponsorMaskTertiaryTransparent: false,
  crestFile:      '',
  crestVisible:   true,
  sponsorVisible: true,
  crestScale:     0.08,
  crestX:         0.59,
  crestY:         0.26,
  collarName:     '',
  kitName:        '',
  shortsStyleName:'',
  socksStyleName: '',
};

const state = {
  ...DEFAULTS,
  patternLayers: DEFAULTS.patternLayers.map(l => ({ ...l })),
  crestImg: null,
  sponsorFixedImg: null,
  sponsorMaskPrimaryImg: null,
  sponsorMaskSecondaryImg: null,
  sponsorMaskTertiaryImg: null,
  patternLayerImgs: [null, null, null]
};

/* Canvas display size – width fixed, height computed from template aspect ratio */
const CW = 800;
let CH = 900;                         /* updated after template loads */

const TMPL_BASE = '/gfx/kit_templates/';
const BASE = TMPL_BASE + 'fullkit/';

/* ═══════════════════════════════════════════════════════════════════
   2. TEMPLATE LAYER SYSTEM  (fullkit: shirt + shorts + socks + collar + boots)
   ═══════════════════════════════════════════════════════════════════ */

/* Native-resolution originals (kept for full-quality PNG export) */
const TMPL = {
  shirt:   { primary: null, secondary: null, tertiary: null, quaternary: null },
  shorts:  { primary: null, secondary: null, tertiary: null, quaternary: null },
  socks:   { primary: null, secondary: null, tertiary: null, quaternary: null },
  collar:  { primary: null, secondary: null, tertiary: null, quaternary: null },
  shirtShadows: null,        shirtHighlights: null,
  shortsSocksShadows: null,  shortsSocksHighlights: null,
  collarShadows: null,       collarHighlights: null,
  collarUnderShadows: null,
  boots: null,
  loaded: false,
  nw: 0, nh: 0,
};

/* Display-resolution copies (used for fast interactive preview) */
const SM = {
  shirt:   { primary: null, secondary: null, tertiary: null, quaternary: null },
  shorts:  { primary: null, secondary: null, tertiary: null, quaternary: null },
  socks:   { primary: null, secondary: null, tertiary: null, quaternary: null },
  collar:  { primary: null, secondary: null, tertiary: null, quaternary: null },
  bodyShadows: null,           /* shirt + shorts/socks shadows (pre-composited) */
  bodyHighlights: null,        /* shirt + shorts/socks highlights (pre-composited) */
  collarShadows: null,         /* collar-only shadows */
  collarHighlights: null,      /* collar-only highlights */
  collarUnderShadows: null,    /* shadow cast under collar flip onto shirt */
  boots: null,
};

/* Offscreen canvases – sized to DISPLAY resolution for fast preview */
const _tint   = document.createElement('canvas');
const _tintCtx = _tint.getContext('2d');
const _comp   = document.createElement('canvas');
const _compCtx = _comp.getContext('2d');
const _pat    = document.createElement('canvas');
const _patCtx  = _pat.getContext('2d');
const _aux    = document.createElement('canvas');
const _auxCtx  = _aux.getContext('2d');
const _mask   = document.createElement('canvas');
const _maskCtx = _mask.getContext('2d');
const _sponsorTint = document.createElement('canvas');
const _sponsorTintCtx = _sponsorTint.getContext('2d');

/* Reusable tile canvas for pattern rendering (avoids GC churn) */
let _tileCvs = document.createElement('canvas');
let _tileCtx = _tileCvs.getContext('2d');

/* Backup of fullkit shirt primary (restored when switching kit designs) */
let _fullkitShirtPrimary = null;
const _fullkitShortsMasks = { primary: null, secondary: null, tertiary: null, quaternary: null };
const _fullkitSocksMasks  = { primary: null, secondary: null, tertiary: null, quaternary: null };

function loadImage(src) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload  = () => resolve(img);
    img.onerror = () => { console.warn('[TMPL] Failed to load:', src); resolve(null); };
    img.src = src;
  });
}

/** Set all shared offscreen canvases to the given dimensions. */
function sizeOffscreen(w, h) {
  [_tint, _comp, _pat, _aux, _mask].forEach(c => { c.width = w; c.height = h; });
}

/**
 * Scale an image/canvas down to display resolution (CW × CH).
 * Returns a new canvas or null.
 */
function scaleDown(img) {
  if (!img) return null;
  const c = document.createElement('canvas');
  c.width = CW; c.height = CH;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, CW, CH);
  return c;
}

/**
 * OPT 1 — Pre-composite shadow & highlight layers at display resolution.
 * Avoids combining 3+3 images on every frame.
 * Call after loading base kit or changing collar.
 */
function buildCombinedOverlays() {
  /* Body shadows (shirt + shorts/socks only — NOT collar) */
  const bsc = document.createElement('canvas');
  bsc.width = CW; bsc.height = CH;
  const bsCtx = bsc.getContext('2d');
  if (TMPL.shirtShadows)       bsCtx.drawImage(TMPL.shirtShadows, 0, 0, CW, CH);
  if (TMPL.shortsSocksShadows) bsCtx.drawImage(TMPL.shortsSocksShadows, 0, 0, CW, CH);
  SM.bodyShadows = bsc;

  /* Body highlights (shirt + shorts/socks only — NOT collar) */
  const bhc = document.createElement('canvas');
  bhc.width = CW; bhc.height = CH;
  const bhCtx = bhc.getContext('2d');
  if (TMPL.shirtHighlights)       bhCtx.drawImage(TMPL.shirtHighlights, 0, 0, CW, CH);
  if (TMPL.shortsSocksHighlights) bhCtx.drawImage(TMPL.shortsSocksHighlights, 0, 0, CW, CH);
  SM.bodyHighlights = bhc;

  /* Collar shadows & highlights (separate, applied after collar color layers) */
  SM.collarShadows    = scaleDown(TMPL.collarShadows);
  SM.collarHighlights = scaleDown(TMPL.collarHighlights);
}

/**
 * OPT 3 — Build display-resolution copies of every mask & boots image.
 * The preview render then operates at 800×~900 instead of native
 * (typically 4000×4500), yielding a ~25× speedup.
 */
function buildDisplayCopies() {
  for (const part of ['shirt', 'shorts', 'socks', 'collar']) {
    for (const role of ['primary', 'secondary', 'tertiary', 'quaternary']) {
      SM[part][role] = scaleDown(TMPL[part][role]);
    }
  }
  SM.boots = scaleDown(TMPL.boots);
  buildCombinedOverlays();
}

/**
 * Load the base fullkit layers (shirt primary, shorts, socks, shadows, highlights, boots).
 * Shirt secondary/tertiary come from the selected kit design folder.
 * Collar layers are loaded separately via loadCollar().
 */
async function loadFullKit() {
  TMPL.loaded = false;
  const bust = '?v=' + Date.now();

  /* Base layers from fullkit/ — shirt secondary & tertiary are kit-specific */
  const files = {
    'shirt.primary':          'mask_shirt_primary.png',
    'shorts.primary':         'mask_shorts_primary.png',
    'shorts.secondary':       'mask_shorts_secondary.png',
    'shorts.tertiary':        'mask_shorts_tertiary.png',
    'socks.primary':          'mask_socks_primary.png',
    'socks.secondary':        'mask_socks_secondary.png',
    'socks.tertiary':         'mask_socks_tertiary.png',
    'shirtShadows':           'shirt_overlay_shadows_mul.png',
    'shirtHighlights':        'shirt_overlay_highlights.png',
    'shortsSocksShadows':     'shorts_socks_overlay_shadows_mul.png',
    'shortsSocksHighlights':  'shorts_socks_overlay_highlights.png',
    'boots':                  'boots.png',
  };

  /* Clear shirt secondary/tertiary/quaternary (loaded separately per kit) */
  TMPL.shirt.secondary   = null;
  TMPL.shirt.tertiary    = null;
  TMPL.shirt.quaternary  = null;

  await Promise.all(
    Object.entries(files).map(async ([key, file]) => {
      const img = await loadImage(BASE + file + bust);
      if (key.includes('.')) {
        const [part, role] = key.split('.');
        TMPL[part][role] = img;
      } else {
        TMPL[key] = img;
      }
    })
  );

  /* Dimensions from the first loaded shirt mask */
  if (TMPL.shirt.primary) {
    TMPL.nw = TMPL.shirt.primary.naturalWidth;
    TMPL.nh = TMPL.shirt.primary.naturalHeight;
    /* Adjust display canvas to match aspect ratio */
    CH = Math.round(CW * TMPL.nh / TMPL.nw);
    const cvs = document.getElementById('cvsKit');
    cvs.width = CW; cvs.height = CH;
    /* Size offscreen canvases to DISPLAY resolution (not native!) */
    sizeOffscreen(CW, CH);
    /* Build display-res copies of every mask layer */
    buildDisplayCopies();
    updateShirtColorVisibility();
    updatePartColorVisibility('shorts');
    updatePartColorVisibility('socks');
  }

  /* Keep a copy of the default shirt primary for kit-switching */
  _fullkitShirtPrimary = TMPL.shirt.primary;
  for (const role of ['primary', 'secondary', 'tertiary', 'quaternary']) {
    _fullkitShortsMasks[role] = TMPL.shorts[role];
    _fullkitSocksMasks[role] = TMPL.socks[role];
  }

  TMPL.loaded = !!(TMPL.shirt.primary && TMPL.shirtShadows && TMPL.shirtHighlights);
  console.log('[TMPL] FullKit loaded:', TMPL.loaded,
    TMPL.loaded ? `native ${TMPL.nw}x${TMPL.nh}, preview ${CW}x${CH}` : '');
}

/**
 * Load collar layers from the collar's own folder (e.g. kit_templates/collar01/).
 * Files inside use generic names: mask_primary.png, mask_secondary.png, etc.
 */
async function loadCollar(collarName) {
  const bust = '?v=' + Date.now();
  const collarBase = TMPL_BASE + collarName + '/';
  const [p, s, t, sh, hl, uSh] = await Promise.all([
    loadImage(collarBase + 'mask_primary.png' + bust),
    loadImage(collarBase + 'mask_secondary.png' + bust),
    loadImage(collarBase + 'mask_tertiary.png' + bust),
    loadImage(collarBase + 'overlay_shadows_mul.png' + bust),
    loadImage(collarBase + 'overlay_highlights.png' + bust),
    loadImage(collarBase + 'overlay_shadows_under_mul.png' + bust),
  ]);
  TMPL.collar.primary      = p;
  TMPL.collar.secondary    = s;
  TMPL.collar.tertiary     = t;
  TMPL.collarShadows       = sh;
  TMPL.collarHighlights    = hl;
  TMPL.collarUnderShadows  = uSh;   /* shadow cast under collar flip onto shirt (may be null) */
  /* Rebuild display-res collar masks + re-composite overlays */
  for (const role of ['primary', 'secondary', 'tertiary', 'quaternary']) {
    SM.collar[role] = scaleDown(TMPL.collar[role]);
  }
  SM.collarUnderShadows = scaleDown(TMPL.collarUnderShadows);
  buildCombinedOverlays();
  console.log('[TMPL] Collar loaded:', collarName, 'from', collarBase);
}

/**
 * Load shirt secondary & tertiary masks from the selected kit design folder
 * (e.g. kit_templates/kit01/).
 *
 * @param {string} kitName   – e.g. "kit01"
 * @param {string[]} files   – actual filenames found in the folder (from API)
 */
async function loadKitDesign(kitName, files) {
  const bust = '?v=' + Date.now();
  const kitBase = TMPL_BASE + kitName + '/';
  files = (files || []).map(f => f.toLowerCase());

  /* Resolve a mask: prefer "mask_shirt_<role>" then "mask_<role>" */
  function findMask(role) {
    const preferred = 'mask_shirt_' + role + '.png';
    const fallback  = 'mask_' + role + '.png';
    if (files.includes(preferred)) return preferred;
    if (files.includes(fallback))  return fallback;
    return null;
  }

  const secFile  = findMask('secondary');
  const terFile  = findMask('tertiary');
  const quatFile = findMask('quaternary');
  const priFile  = findMask('primary');   /* some kits override shirt primary too */

  const [sec, ter, quat, pri] = await Promise.all([
    secFile  ? loadImage(kitBase + secFile  + bust) : Promise.resolve(null),
    terFile  ? loadImage(kitBase + terFile  + bust) : Promise.resolve(null),
    quatFile ? loadImage(kitBase + quatFile + bust) : Promise.resolve(null),
    priFile  ? loadImage(kitBase + priFile  + bust) : Promise.resolve(null),
  ]);

  TMPL.shirt.secondary  = sec;
  TMPL.shirt.tertiary   = ter;
  TMPL.shirt.quaternary = quat;
  /* If the kit supplies its own shirt primary mask, override fullkit's default */
  if (pri) TMPL.shirt.primary = pri;

  /* Rebuild display-res copies for shirt */
  SM.shirt.secondary  = scaleDown(sec);
  SM.shirt.tertiary   = scaleDown(ter);
  SM.shirt.quaternary = scaleDown(quat);
  if (pri) SM.shirt.primary = scaleDown(pri);

  /* Update UI: show/hide color pickers based on available masks */
  updateShirtColorVisibility();

  console.log('[TMPL] Kit design loaded:', kitName, 'files:', files, 'from', kitBase);
}

/**
 * Populate the kit design dropdown and load the first kit.
 * The API now returns { kits: [{ name, files }, ...] }.
 */
const _kitFilesMap = {};   /* kitName -> files[] for quick lookup */
const _shortsFilesMap = {}; /* styleName -> files[] */
const _socksFilesMap = {};  /* styleName -> files[] */

async function loadPartStyle(part, styleName, files) {
  if (!styleName) {
    return;
  }
  const bust = '?v=' + Date.now();
  const styleBase = TMPL_BASE + styleName + '/';
  files = (files || []).map(f => f.toLowerCase());

  function findMask(role) {
    const partSpecific = `mask_${part}_${role}.png`;
    const generic = `mask_${role}.png`;
    if (files.includes(partSpecific)) return partSpecific;
    if (files.includes(generic)) return generic;
    return null;
  }

  const secFile = findMask('secondary');
  const terFile = findMask('tertiary');
  const quatFile = findMask('quaternary');
  const [sec, ter, quat] = await Promise.all([
    secFile ? loadImage(styleBase + secFile + bust) : Promise.resolve(null),
    terFile ? loadImage(styleBase + terFile + bust) : Promise.resolve(null),
    quatFile ? loadImage(styleBase + quatFile + bust) : Promise.resolve(null),
  ]);

  TMPL[part].secondary = sec || _fullkitShortsMasks.secondary;
  TMPL[part].tertiary = ter || _fullkitShortsMasks.tertiary;
  TMPL[part].quaternary = quat || _fullkitShortsMasks.quaternary;
  if (part === 'socks') {
    TMPL[part].secondary = sec || _fullkitSocksMasks.secondary;
    TMPL[part].tertiary = ter || _fullkitSocksMasks.tertiary;
    TMPL[part].quaternary = quat || _fullkitSocksMasks.quaternary;
  }

  SM[part].secondary = scaleDown(TMPL[part].secondary);
  SM[part].tertiary = scaleDown(TMPL[part].tertiary);
  SM[part].quaternary = scaleDown(TMPL[part].quaternary);
  updatePartColorVisibility(part);
}

async function loadKitList() {
  try {
    const res = await fetch('/kit-designer/api/kits');
    const data = await res.json();
    const kits = data.kits || [];
    const sel = document.getElementById('kitSelect');
    sel.innerHTML = '';
    const defaultOpt = document.createElement('option');
    defaultOpt.value = '';
    defaultOpt.textContent = 'Default (fullkit primary)';
    sel.appendChild(defaultOpt);
    kits.forEach(k => {
      _kitFilesMap[k.name] = k.files;
      const opt = document.createElement('option');
      opt.value = k.name;
      opt.textContent = k.name;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', async () => {
      state.kitName = sel.value;
      if (sel.value) {
        /* Restore fullkit shirt primary before loading new kit (in case previous kit overrode it) */
        TMPL.shirt.primary = _fullkitShirtPrimary;
        SM.shirt.primary   = scaleDown(_fullkitShirtPrimary);
        /* Clear all kit-specific masks before loading new ones */
        TMPL.shirt.secondary = null; TMPL.shirt.tertiary = null; TMPL.shirt.quaternary = null;
        SM.shirt.secondary   = null; SM.shirt.tertiary   = null; SM.shirt.quaternary   = null;
        await loadKitDesign(sel.value, _kitFilesMap[sel.value]);
      } else {
        TMPL.shirt.primary = _fullkitShirtPrimary;
        SM.shirt.primary = scaleDown(_fullkitShirtPrimary);

/* ═══════════════════════════════════════════════════════════════════
   3. RENDERING ENGINE
   ═══════════════════════════════════════════════════════════════════ */

/** Kit parts — body parts first, collar rendered on top. */
const BODY_PARTS = ['shirt', 'shorts', 'socks'];
const PARTS = [...BODY_PARTS, 'collar'];

/**
 * Get the color for a given part + role from state.
 * Returns null if the layer is set to transparent (secondary/tertiary/quaternary)
 * or if there is no mask loaded for the part+role.
 */
function getColor(part, role) {
  const key = part + role.charAt(0).toUpperCase() + role.slice(1);
  if (state[key + 'Transparent']) return null;
  return state[key + 'Color'];
}

/**
 * Show/hide shirt color rows based on which masks the current kit has loaded.
 * Primary is always visible.
 * Also toggles the quaternary pattern target checkbox visibility.
 */
function updateShirtColorVisibility() {
  const hasSec  = !!(TMPL.shirt.secondary);
  const hasTer  = !!(TMPL.shirt.tertiary);
  const hasQuat = !!(TMPL.shirt.quaternary);

  document.getElementById('shirtSecRow').style.display  = hasSec  ? '' : 'none';
  document.getElementById('shirtTerRow').style.display  = hasTer  ? '' : 'none';
  document.getElementById('shirtQuatRow').style.display = hasQuat ? '' : 'none';

  /* Also toggle pattern target checkbox for quaternary */
  ['pat1_shirt_quat_row', 'pat2_shirt_quat_row', 'pat3_shirt_quat_row'].forEach((rowId) => {
    const row = document.getElementById(rowId);
    if (row) row.style.display = hasQuat ? '' : 'none';
  });
}

function updatePartColorVisibility(part) {
  const hasSec = !!(TMPL[part] && TMPL[part].secondary);
  const hasTer = !!(TMPL[part] && TMPL[part].tertiary);
  const secRow = document.getElementById(part + 'SecRow');
  const terRow = document.getElementById(part + 'TerRow');
  if (secRow) secRow.style.display = hasSec ? '' : 'none';
  if (terRow) terRow.style.display = hasTer ? '' : 'none';
}

/** Helper: rounded rectangle path */
function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

/**
 * Build a tiled, tinted, clipped pattern layer.
 * @param {HTMLCanvasElement|HTMLImageElement} clipMask – mask to clip to
 * @param {number} w – target width
 * @param {number} h – target height
 * @param {CanvasRenderingContext2D} pCtx – pattern scratch context
 * @param {CanvasRenderingContext2D} tCtx – tint scratch context (used as temp buffer)
 */
function buildPatternAt(img, color, scale, offsetX, offsetY, rotateDeg, clipMask, w, h, pCtx, tCtx) {
  const resFactor = w / CW;              /* 1.0 at preview res, ~5× at native export res */

  /* Step 1: Tile the pattern at the chosen scale (proportional to canvas size) */
  pCtx.clearRect(0, 0, w, h);
  pCtx.save();
  const sw = img.naturalWidth  * scale * resFactor;
  const sh = img.naturalHeight * scale * resFactor;
  _tileCvs.width  = Math.max(1, Math.round(sw));
  _tileCvs.height = Math.max(1, Math.round(sh));
  _tileCtx.drawImage(img, 0, 0, _tileCvs.width, _tileCvs.height);
  const pat = pCtx.createPattern(_tileCvs, 'repeat');
  /* Apply horizontal / vertical offset (fraction of one tile) */
  const ox = offsetX * _tileCvs.width;
  const oy = offsetY * _tileCvs.height;
  pCtx.translate(w * 0.5, h * 0.5);
  pCtx.rotate((rotateDeg || 0) * Math.PI / 180);
  pCtx.translate(-w * 0.5, -h * 0.5);
  pCtx.translate(ox, oy);
  pCtx.fillStyle = pat;
  pCtx.fillRect(-ox, -oy, w, h);
  pCtx.restore();

  /* Step 2: Tint – replace with patternColor, keep alpha */
  tCtx.clearRect(0, 0, w, h);
  tCtx.drawImage(pCtx.canvas, 0, 0);
  pCtx.clearRect(0, 0, w, h);
  pCtx.fillStyle = color;
  pCtx.fillRect(0, 0, w, h);
  pCtx.globalCompositeOperation = 'destination-in';
  pCtx.drawImage(tCtx.canvas, 0, 0);
  pCtx.globalCompositeOperation = 'source-over';

  /* Step 3: Clip to the target mask zone */
  pCtx.globalCompositeOperation = 'destination-in';
  pCtx.drawImage(clipMask, 0, 0);
  pCtx.globalCompositeOperation = 'source-over';

  return pCtx.canvas;
}

/**
 * Draw sponsor bg, sponsor image, and crest.
 *
 * @param {CanvasRenderingContext2D} ctx – the context to draw on
 * @param {number} W – width of the coordinate space
 * @param {number} H – height of the coordinate space
 */
function drawOverlays(ctx, W, H) {
  const chestW = W * 0.72;

  /* ── Sponsor (centered on chest, Y adjustable via slider) ─ */
  const spCX = W * state.sponsorX;
  const spCY = H * state.sponsorY;

  const spMaxW = chestW * state.sponsorScale;
  const spMaxH = spMaxW * 0.35;
  const bgScaleX = Math.max(0.60, Math.min(1.20, state.sponsorBgScaleX || 1));
  const bgScaleY = Math.max(0.60, Math.min(1.20, state.sponsorBgScaleY || 1));

  if (state.sponsorVisible && (state.sponsorFixedImg || state.sponsorMaskPrimaryImg || state.sponsorMaskSecondaryImg || state.sponsorMaskTertiaryImg)) {
    const baseImg = state.sponsorFixedImg || state.sponsorMaskPrimaryImg || state.sponsorMaskSecondaryImg || state.sponsorMaskTertiaryImg;
    if (baseImg) {
      const scale = Math.min(spMaxW / baseImg.naturalWidth, spMaxH / baseImg.naturalHeight);
      const sw = baseImg.naturalWidth * scale;
      const sh = baseImg.naturalHeight * scale;
      const sx = spCX - sw / 2;
      const sy = spCY - sh / 2;

      if (state.sponsorBg !== 'transparent') {
        const bgCol = state.sponsorBg === 'primary' ? state.shirtPrimaryColor : state.shirtSecondaryColor;
        const pad = 4 * (W / CW);
        const bw = sw * bgScaleX;
        const bh = sh * bgScaleY;
        const bx = spCX - bw / 2;
        const by = spCY - bh / 2;
        ctx.fillStyle = bgCol;
        rrect(ctx, bx - pad, by - pad, bw + pad * 2, bh + pad * 2, 4 * (W / CW));
        ctx.fill();
      }

      // Fixed-color sponsor art is drawn first, then tintable masks on top.
      if (state.sponsorFixedImg) {
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(state.sponsorFixedImg, sx, sy, sw, sh);
      }

      const drawTintedMask = (img, color) => {
        if (!img || !color) return;
        _sponsorTint.width = Math.max(1, Math.round(sw));
        _sponsorTint.height = Math.max(1, Math.round(sh));
        _sponsorTintCtx.clearRect(0, 0, _sponsorTint.width, _sponsorTint.height);
        _sponsorTintCtx.fillStyle = color;
        _sponsorTintCtx.fillRect(0, 0, _sponsorTint.width, _sponsorTint.height);
        _sponsorTintCtx.globalCompositeOperation = 'destination-in';
        _sponsorTintCtx.drawImage(img, 0, 0, _sponsorTint.width, _sponsorTint.height);
        _sponsorTintCtx.globalCompositeOperation = 'source-over';
        ctx.drawImage(_sponsorTint, sx, sy, sw, sh);
      };

      drawTintedMask(state.sponsorMaskPrimaryImg, state.sponsorMaskPrimaryColor);
      if (!state.sponsorMaskSecondaryTransparent) {
        drawTintedMask(state.sponsorMaskSecondaryImg, state.sponsorMaskSecondaryColor);
      }
      if (!state.sponsorMaskTertiaryTransparent) {
        drawTintedMask(state.sponsorMaskTertiaryImg, state.sponsorMaskTertiaryColor);
      }
    }
  } else if (state.sponsorBg !== 'transparent') {
    const bgCol = state.sponsorBg === 'primary' ? state.shirtPrimaryColor : state.shirtSecondaryColor;
    const bw = spMaxW * bgScaleX;
    const bh = spMaxH * bgScaleY;
    ctx.fillStyle = bgCol;
    rrect(ctx, spCX - bw / 2, spCY - bh / 2, bw, bh, 4 * (W / CW));
    ctx.fill();
  }

  /* ── Crest (position adjustable via sliders) ──────────── */
  if (state.crestVisible && state.crestImg) {
    const img = state.crestImg;
    const maxS = H * state.crestScale;
    const scale = Math.min(maxS / img.naturalWidth, maxS / img.naturalHeight);
    const cw = img.naturalWidth  * scale;
    const ch = img.naturalHeight * scale;
    const cx = W * state.crestX - cw / 2;
    const cy = H * state.crestY - ch / 2;
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(img, cx, cy, cw, ch);
  }
}

/**
 * Core rendering pipeline — runs on any set of layer sources at any resolution.
 *
 * @param {Object}   src        – SM (display-res) or TMPL-like (native-res) layer set
 * @param {number}   w          – render width
 * @param {number}   h          – render height
 * @param {CanvasRenderingContext2D} compCtx – compositing context
 * @param {CanvasRenderingContext2D} tCtx    – tint scratch context
 * @param {CanvasRenderingContext2D} pCtx    – pattern scratch context
 * @param {CanvasRenderingContext2D} mCtx    – mask scratch context
 * @param {CanvasRenderingContext2D} aCtx    – aux scratch context (export only)
 * @param {boolean}  useCombined – true → use src.combinedShadows/Highlights
 */
function renderPipeline(src, w, h, compCtx, tCtx, pCtx, mCtx, aCtx, useCombined) {
  compCtx.clearRect(0, 0, w, h);
  const roles = ['primary', 'secondary', 'tertiary', 'quaternary'];

  /** Helper: tint & pattern a set of parts for one role */
  function renderPartsForRole(parts, role) {
    for (const part of parts) {
      const mask = src[part][role];
      const color = getColor(part, role);
      if (mask && color) {
        tCtx.clearRect(0, 0, w, h);
        tCtx.fillStyle = color;
        tCtx.fillRect(0, 0, w, h);
        tCtx.globalCompositeOperation = 'destination-in';
        tCtx.drawImage(mask, 0, 0);
        tCtx.globalCompositeOperation = 'source-over';
        compCtx.drawImage(tCtx.canvas, 0, 0);
      }
    }

    /* Apply each pattern layer to checked targets matching this role */
    for (let layerIndex = 0; layerIndex < 3; layerIndex++) {
      const layer = state.patternLayers[layerIndex];
      const img = state.patternLayerImgs[layerIndex];
      if (!img || !layer || !layer.targets || layer.targets.length === 0) {
        continue;
      }
      const masksForRole = [];
      for (const t of layer.targets) {
        const [tPart, tRole] = t.split('_');
        if (tRole === role && parts.includes(tPart) && src[tPart] && src[tPart][role]) {
          masksForRole.push(src[tPart][role]);
        }
      }
      if (masksForRole.length > 0) {
        mCtx.clearRect(0, 0, w, h);
        masksForRole.forEach(m => { if (m) mCtx.drawImage(m, 0, 0); });
        compCtx.drawImage(
          buildPatternAt(
            img,
            layer.color,
            layer.scale ?? 1,
            layer.offsetX ?? 0,
            layer.offsetY ?? 0,
            layer.rotateDeg ?? 0,
            mCtx.canvas,
            w,
            h,
            pCtx,
            tCtx
          ),
          0,
          0
        );
      }
    }
  }

  /** Helper: apply a shadow layer (multiply blend, alpha-preserved) */
  function applyShadow(shadowImg) {
    if (!shadowImg) return;
    tCtx.clearRect(0, 0, w, h);
    tCtx.drawImage(compCtx.canvas, 0, 0);
    tCtx.globalCompositeOperation = 'multiply';
    tCtx.drawImage(shadowImg, 0, 0, w, h);
    tCtx.globalCompositeOperation = 'source-over';
    tCtx.globalCompositeOperation = 'destination-in';
    tCtx.drawImage(compCtx.canvas, 0, 0);
    tCtx.globalCompositeOperation = 'source-over';
    compCtx.clearRect(0, 0, w, h);
    compCtx.drawImage(tCtx.canvas, 0, 0);
  }

  /** Helper: apply a highlight layer (screen blend) */
  function applyHighlight(highlightImg) {
    if (!highlightImg) return;
    compCtx.globalCompositeOperation = 'screen';
    compCtx.drawImage(highlightImg, 0, 0, w, h);
    compCtx.globalCompositeOperation = 'source-over';
  }

  /* ── 1. Body parts: shirt + shorts + socks (colors + patterns) ── */
  for (const role of roles) {
    renderPartsForRole(BODY_PARTS, role);
  }

  /* ── 2. Crest & sponsor overlays (on top of shirt, under collar) ── */
  drawOverlays(compCtx, w, h);

  /* ── 3. Body shadows (shirt + shorts/socks — NOT collar) ── */
  if (useCombined) {
    applyShadow(src.bodyShadows);
  } else {
    aCtx.clearRect(0, 0, w, h);
    if (TMPL.shirtShadows)       aCtx.drawImage(TMPL.shirtShadows, 0, 0, w, h);
    if (TMPL.shortsSocksShadows) aCtx.drawImage(TMPL.shortsSocksShadows, 0, 0, w, h);
    applyShadow(aCtx.canvas);
  }

  /* ── 4. Body highlights (shirt + shorts/socks — NOT collar) ── */
  if (useCombined) {
    applyHighlight(src.bodyHighlights);
  } else {
    aCtx.clearRect(0, 0, w, h);
    if (TMPL.shirtHighlights)       aCtx.drawImage(TMPL.shirtHighlights, 0, 0, w, h);
    if (TMPL.shortsSocksHighlights) aCtx.drawImage(TMPL.shortsSocksHighlights, 0, 0, w, h);
    applyHighlight(aCtx.canvas);
  }

  /* ── 5. Collar under-shadow (shadow cast by collar flip onto the shirt) ── */
  const underSh = useCombined ? src.collarUnderShadows : TMPL.collarUnderShadows;
  applyShadow(underSh);

  /* ── 6. Collar color layers (rendered over body + lighting + under-shadow) ── */
  for (const role of roles) {
    renderPartsForRole(['collar'], role);
  }

  /* ── 7. Collar shadows (only affects the collar) ── */
  if (useCombined) {
    applyShadow(src.collarShadows);
  } else {
    applyShadow(TMPL.collarShadows);
  }

  /* ── 8. Collar highlights (only affects the collar, after collar shadows) ── */
  if (useCombined) {
    applyHighlight(src.collarHighlights);
  } else {
    applyHighlight(TMPL.collarHighlights);
  }

  /* ── 9. Boots (static, drawn on top of everything) ── */
  const bootsImg = useCombined ? src.boots : TMPL.boots;
  if (bootsImg) compCtx.drawImage(bootsImg, 0, 0, w, h);
}

/**
 * PREVIEW render — uses display-res SM copies on shared offscreen canvases.
 * OPT 3: All canvas operations run at 800×~900 instead of native resolution.
 */
function renderKit() {
  const cvs = document.getElementById('cvsKit');
  const ctx = cvs.getContext('2d');
  ctx.clearRect(0, 0, CW, CH);

  if (!TMPL.loaded) {
    ctx.fillStyle = '#888';
    ctx.font = '18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Loading template...', CW / 2, CH / 2);
    return;
  }

  renderPipeline(SM, CW, CH, _compCtx, _tintCtx, _patCtx, _maskCtx, _auxCtx, true);

  /* Already at display resolution — draw 1:1, no scaling needed */
  ctx.drawImage(_comp, 0, 0);
}

/**
 * OPT 2 — Debounced render scheduling.
 * Caps rendering at ~33 fps while dragging sliders, preventing jank.
 * Clicks/changes still feel instant (≤30ms latency).
 */
let _schedTimer = null;
function scheduleRender() {
  if (_schedTimer !== null) return;
  _schedTimer = setTimeout(() => {
    _schedTimer = null;
    requestAnimationFrame(renderKit);
  }, 30);
}

/* ═══════════════════════════════════════════════════════════════════
   4. UI HELPERS
   ═══════════════════════════════════════════════════════════════════ */

function syncColor(pickId, hexId, key) {
  const layerMatch = key.match(/^patternLayer([1-3])Color$/);
  const layerIndex = layerMatch ? (parseInt(layerMatch[1], 10) - 1) : null;
  const pick = document.getElementById(pickId);
  const hex  = document.getElementById(hexId);
  pick.addEventListener('input', () => {
    hex.value = pick.value.toUpperCase();
    state[key] = pick.value;
    if (layerIndex !== null) state.patternLayers[layerIndex].color = pick.value;
    scheduleRender();
  });
  hex.addEventListener('input', () => {
    const v = hex.value.trim();
    if (/^#[0-9A-Fa-f]{6}$/.test(v)) {
      pick.value = v;
      state[key] = v;
      if (layerIndex !== null) state.patternLayers[layerIndex].color = v;
      scheduleRender();
    }
  });
}

async function loadAssetList(endpoint, selectId, stateImgKey, stateFileKey, basePath) {
  try {
    const res = await fetch(endpoint);
    const data = await res.json();
    const key = Object.keys(data)[0];
    const files = data[key] || [];
    const sel = document.getElementById(selectId);
    files.forEach(f => {
      const opt = document.createElement('option');
      opt.value = f; opt.textContent = f;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', async () => {
      state[stateFileKey] = sel.value;
      if (sel.value) {
        state[stateImgKey] = await loadImage(basePath + sel.value);
      } else {
        state[stateImgKey] = null;
      }
      scheduleRender();
    });
  } catch (e) {
    console.warn('Could not load asset list:', endpoint, e);
  }
}

async function loadPatternLists() {
  try {
    const res = await fetch('/kit-designer/api/patterns');
    const data = await res.json();
    const files = data.patterns || [];
    const selectors = [
      document.getElementById('pattern1Select'),
      document.getElementById('pattern2Select'),
      document.getElementById('pattern3Select')
    ];
    selectors.forEach((sel, idx) => {
      files.forEach(f => {
        const opt = document.createElement('option');
        opt.value = f;
        opt.textContent = f.replace(/\.[^.]+$/, '');
        sel.appendChild(opt);
      });
      sel.addEventListener('change', async () => {
        state.patternLayers[idx].file = sel.value;
        if (sel.value) {
          const bust = '?v=' + Date.now();
          state.patternLayerImgs[idx] = await loadImage('/gfx/kit_templates/patterns/' + sel.value + bust);
        } else {
          state.patternLayerImgs[idx] = null;
        }
        scheduleRender();
      });
    });
  } catch (e) {
    console.warn('Could not load pattern lists:', e);
  }
}

async function loadSponsorDesignList() {
  try {
    const res = await fetch('/kit-designer/api/sponsor-designs');
    const data = await res.json();
    const designs = data.sponsor_designs || [];
    const sel = document.getElementById('sponsorDesignSelect');
    sel.innerHTML = '<option value="">\u2014 None \u2014</option>';
    const designFilesMap = {};
    designs.forEach(d => {
      designFilesMap[d.name] = (d.files || []).map(f => f.toLowerCase());
      const opt = document.createElement('option');
      opt.value = d.name;
      opt.textContent = d.name;
      sel.appendChild(opt);
    });

    const resolveMaskFile = (files, role) => {
      const candidates = [
        `mask_${role}.png`,
        `sponsor_${role}.png`,
      ];
      for (const c of candidates) {
        if (files.includes(c)) return c;
      }
      return null;
    };

    const resolveFixedFile = (files) => {
      const candidates = ['fixed_color.png', 'sponsor_fixed.png'];
      for (const c of candidates) {
        if (files.includes(c)) return c;
      }
      return null;
    };

    sel.addEventListener('change', async () => {
      state.sponsorDesignName = sel.value;
      state.sponsorFixedImg = null;
      state.sponsorMaskPrimaryImg = null;
      state.sponsorMaskSecondaryImg = null;
      state.sponsorMaskTertiaryImg = null;
      if (!sel.value) {
        scheduleRender();
        return;
      }
      const files = designFilesMap[sel.value] || [];
      const fixedFile = resolveFixedFile(files);
      const primaryFile = resolveMaskFile(files, 'primary');
      const secondaryFile = resolveMaskFile(files, 'secondary');
      const tertiaryFile = resolveMaskFile(files, 'tertiary');
      const base = '/gfx/sponsors/' + encodeURIComponent(sel.value) + '/';
      const bust = '?v=' + Date.now();
      if (fixedFile) {
        state.sponsorFixedImg = await loadImage(base + fixedFile + bust);
      }
      if (primaryFile) {
        state.sponsorMaskPrimaryImg = await loadImage(base + primaryFile + bust);
      }
      if (secondaryFile) {
        state.sponsorMaskSecondaryImg = await loadImage(base + secondaryFile + bust);
      }
      if (tertiaryFile) {
        state.sponsorMaskTertiaryImg = await loadImage(base + tertiaryFile + bust);
      }
      scheduleRender();
    });
  } catch (e) {
    console.warn('Could not load sponsor design list:', e);
  }
}

/**
 * EXPORT — full-quality render at native resolution using TMPL originals.
 * Creates dedicated offscreen canvases so the shared preview canvases stay untouched.
 */
function exportPNG(canvasId, filename) {
  if (!TMPL.loaded) return;

  const nw = TMPL.nw, nh = TMPL.nh;

  /* Allocate temporary canvases at native resolution */
  const eComp = document.createElement('canvas'); eComp.width = nw; eComp.height = nh;
  const eTint = document.createElement('canvas'); eTint.width = nw; eTint.height = nh;
  const ePat  = document.createElement('canvas'); ePat.width  = nw; ePat.height  = nh;
  const eMask = document.createElement('canvas'); eMask.width = nw; eMask.height = nh;
  const eAux  = document.createElement('canvas'); eAux.width  = nw; eAux.height  = nh;

  renderPipeline(
    TMPL, nw, nh,
    eComp.getContext('2d'),
    eTint.getContext('2d'),
    ePat.getContext('2d'),
    eMask.getContext('2d'),
    eAux.getContext('2d'),
    false  /* build shadow/highlight composites on the fly at native res */
  );

  const link = document.createElement('a');
  link.download = filename;
  link.href = eComp.toDataURL('image/png');
  link.click();
}
